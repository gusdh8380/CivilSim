name: Build and Deploy WebGL

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - '.github/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build WebGL and Deploy to Netlify
    runs-on: self-hosted
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build WebGL (custom HTML shell)
        run: |
          UNITY="/Applications/Unity/Hub/Editor/6000.3.10f1/Unity.app/Contents/MacOS/Unity"
          LOG="${{ github.workspace }}/unity-build.log"

          "$UNITY" \
            -quit -batchmode \
            -projectPath "${{ github.workspace }}" \
            -buildTarget WebGL \
            -executeMethod CivilSim.Editor.WebGLReleaseBuilder.BuildReleaseCI \
            -logFile "$LOG"

          EXIT_CODE=$?
          if [ $EXIT_CODE -ne 0 ]; then
            echo "=== Unity Build Log ==="
            cat "$LOG"
            exit $EXIT_CODE
          fi

          if [ ! -d "${{ github.workspace }}/Builds/WebGL" ]; then
            echo "=== Build output not found. Unity Build Log ==="
            cat "$LOG"
            exit 1
          fi

      - name: Deploy to Netlify
        run: npx --yes netlify-cli deploy --dir=Builds/WebGL --prod
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: CivilSim-WebGL-${{ github.sha }}
          path: Builds/WebGL
          retention-days: 14
